<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skipy</title>
  <link rel="icon" type="image/svg+xml" href="assets/fox-favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img src="assets/fox-favicon.svg" alt="Skipy" class="brand-mark" />
        <span class="brand-name">Skipy</span>
      </div>
      <button id="newChatBtn" class="new-chat-btn" title="Start a new conversation">New chat</button>
    </header>
    <main id="chatWindow" class="chat-window">
      <div class="empty-state" id="emptyState">
        <img src="assets/fox-favicon.svg" alt="Skipy" class="empty-mark" />
        <h1>What can I help with?</h1>
        <p>Ask me anything — I'm Skipy, running on Groq.</p>
      </div>
    </main>
    <form id="chatForm" class="composer">
      <textarea id="messageInput" class="composer-input" placeholder="Message Skipy..." rows="1" autofocus></textarea>
      <button type="submit" id="sendBtn" class="send-btn" title="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
